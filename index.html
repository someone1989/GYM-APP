function SBar({data,dk,fill,h=140}){if(!data||!data.length)return null;const mx=Math.max(...data.map(d=>+(d[dk])||0),1);const bw=Math.min(30,Math.floor(280/data.length));
  return (<svg width="100%" viewBox={`0 0 ${data.length*(bw+10)} ${h}`} style={{display:"block"}}>{data.map((d,i)=>{const v=+(d[dk])||0;const bh=(v/mx)*(h-32);
    return (<g key={i} style={{animation:`barGrow 0.5s ease-out ${i*0.08}s both`,transformOrigin:"bottom"}}><rect x={i*(bw+10)+5} y={h-bh-22} width={bw} height={bh} rx={4} fill={fill} opacity={0.85}/>
      <text x={i*(bw+10)+5+bw/2} y={h-6} textAnchor="middle" fill="#999" fontSize="10">{d.name}</text>
      {v>0&&<text x={i*(bw+10)+5+bw/2} y={h-bh-26} textAnchor="middle" fill="#ccc" fontSize="10" style={{animation:`fadeIn 0.3s ease-out ${i*0.08+0.4}s both`}}>{v}</text>}
    </g>);})}</svg>);}

function SLine({data,lines,h=150}){if(!data||data.length<2)return null;const allV=lines.flatMap(l=>data.map(d=>+(d[l.key])||0));const mx=Math.max(...allV,1);const mn=Math.min(...allV,0);const rng=mx-mn||1;const p=25;const cw=Math.max(data.length*50,200);
  return (<svg width="100%" viewBox={`0 0 ${cw} ${h}`} style={{display:"block"}}><style>{`@keyframes dl{from{stroke-dashoffset:2000}to{stroke-dashoffset:0}}@keyframes dp{from{r:0;opacity:0}to{r:3.5;opacity:1}}`}</style>{lines.map(line=>{const pts=data.map((d,i)=>{const v=+(d[line.key])||0;const x=p+i*((cw-p*2)/(data.length-1));const y=p+(1-(v-mn)/rng)*(h-p*2);return `${x},${y}`}).join(" ");
    return (<polyline key={line.key} points={pts} fill="none" stroke={line.color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" style={{strokeDasharray:2000,animation:"dl 1s ease-out forwards"}}/>);})}{data.map((d,i)=>{const x=p+i*((cw-p*2)/(data.length-1));return (<text key={i} x={x} y={h-4} textAnchor="middle" fill="#999" fontSize="10">{d.name}</text>)})}{lines.map(line=>data.map((d,i)=>{const v=+(d[line.key])||0;if(!v)return null;const x=p+i*((cw-p*2)/(data.length-1));const y=p+(1-(v-mn)/rng)*(h-p*2);return (<circle key={`${line.key}-${i}`} cx={x} cy={y} r={0} fill={line.color} style={{animation:`dp 0.3s ease-out ${0.7+i*0.1}s forwards`}}/>)}))}</svg>);}

/* ═══════════ REST TIMER ═══════════ */
function RestTimer({ onClose }) {
  const [s, setS] = useState(90);
  const [run, setRun] = useState(false);
  const [ini, setIni] = useState(90);
  const ref = useRef(null);
  useEffect(() => {
    if (run && s > 0) ref.current = setInterval(() => setS(x => x - 1), 1000);
    else if (s === 0 && run) { setRun(false); try { navigator.vibrate?.(500); } catch (e) {} }
    return () => clearInterval(ref.current);
  }, [run, s]);
  const pct = ini > 0 ? (s / ini) * 100 : 0;
  const mm = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
      <button onClick={onClose} style={{position:"absolute",top:20,right:20,background:"none",border:"none",color:"#888",fontSize:36,cursor:"pointer"}}>✕</button>
      <p style={{color:"#999",fontSize:SZ.sm,letterSpacing:3,textTransform:"uppercase",marginBottom:24}}>{t("tim_rest")}</p>
      <div style={{width:220,height:220,borderRadius:"50%",background:`conic-gradient(${s===0?"#ff4757":"#00d2ff"} ${pct}%, #1a1a2e ${pct}%)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:186,height:186,borderRadius:"50%",background:"#0d0d1a",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:56,fontWeight:700,color:s===0?"#ff4757":"#fff",fontFamily:Mo}}>{mm}:{ss}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:12,marginTop:28}}>
        <button onClick={() => setRun(!run)} style={{padding:"14px 38px",borderRadius:50,border:"none",fontSize:SZ.btn,fontWeight:600,background:run?"#ff4757":"#00d2ff",color:run?"#fff":"#000",cursor:"pointer"}}>{run?"Pause":s===0?"Done!":"Start"}</button>
        <button onClick={() => {setRun(false);setS(ini)}} style={{padding:"14px 26px",borderRadius:50,border:"1px solid #333",background:"none",color:"#aaa",fontSize:SZ.btn,cursor:"pointer"}}>Reset</button>
      </div>
      <div style={{display:"flex",gap:8,marginTop:22}}>
        {[60,90,120,180].map(p => (
          <button key={p} onClick={() => {setIni(p);setS(p);setRun(false)}} style={{padding:"9px 18px",borderRadius:22,border:ini===p?"1px solid #00d2ff":"1px solid #333",background:ini===p?"rgba(0,210,255,0.1)":"none",color:ini===p?"#00d2ff":"#999",fontSize:SZ.md,cursor:"pointer"}}>{p}s</button>
        ))}
      </div>
    </div>
  );
}

        {day.type==="workout"&&day.exercises&&day.exercises.map((ex,ei) => {

          const allDone = Array.from({length:ex.sets},(_,s) => cs[gsk(selDay,ei,s)]).every(Boolean);
          const best = e1rm(Math.max(...Array.from({length:ex.sets},(_,s)=>Number(wd[gdk(selDay,ei,s,"w")])||0)),Math.max(...Array.from({length:ex.sets},(_,s)=>Number(wd[gdk(selDay,ei,s,"r")])||0)));
          return (
            <div key={ei} style={{background:allDone?"rgba(0,210,255,0.03)":"#111118",borderRadius:14,padding:"14px 16px",marginBottom:9,border:allDone?"1px solid rgba(0,210,255,0.15)":"1px solid #1a1a25"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",marginBottom:isO?10:0}}>
                <div onClick={() => setAe(isO?null:`${selDay}-${ei}`)} style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                  <div style={{width:5,height:28,borderRadius:3,background:MC[ex.muscle]||"#999"}}/>
                  <div>
                    <p style={{color:allDone?"#aaa":"#eee",fontSize:SZ.md,fontWeight:600,margin:0,textDecoration:allDone?"line-through":"none"}}>{ex.name}</p>
                    <p style={{color:"#999",fontSize:SZ.sm,margin:"2px 0 0"}}>{ex.sets}×{ex.reps}{best>0?` · 1RM≈${best}`:""}</p>
                  </div>
                </div>
                {!allDone && <button onClick={(e) => {e.stopPropagation();completeEx(selDay,ei)}} style={{padding:"5px 10px",borderRadius:7,border:"none",background:"rgba(0,210,255,0.1)",color:"#00d2ff",fontSize:SZ.xs,fontWeight:600,cursor:"pointer",flexShrink:0}}>✓ All</button>}
                <span onClick={() => setAe(isO?null:`${selDay}-${ei}`)} style={{color:"#555",fontSize:SZ.md,transform:isO?"rotate(90deg)":"none",transition:"transform 0.2s",cursor:"pointer",padding:"4px"}}>›</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {Array.from({length:ex.sets},(_,si) => {
                  const sk=gsk(selDay,ei,si), done=cs[sk], wk=gdk(selDay,ei,si,"w"), rk=gdk(selDay,ei,si,"r"), rpek=gdk(selDay,ei,si,"rpe");
                  const pw=wd[pvk(selDay,ei,si,"w")], pr=wd[pvk(selDay,ei,si,"r")];
                  const cw=Number(wd[wk])||0, cr=Number(wd[rk])||0, isPR=cw>0&&pw&&cw>Number(pw);
                  return (
                    <div key={si} style={{display:"flex",alignItems:"center",gap:6,padding:isO?"9px 10px":"5px 10px",background:done?"rgba(0,210,255,0.04)":"rgba(255,255,255,0.015)",borderRadius:9}}>
                      <button onClick={() => {tog(selDay,ei,si);if(!done&&cw>0)detectPR(ex.name,cw,cr)}}
                        style={{width:30,height:30,borderRadius:8,border:"none",flexShrink:0,background:done?"#00d2ff":"#222",color:done?"#000":"#999",fontSize:SZ.sm,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,minWidth:30}}>
                        {done?"✓":si+1}
                      </button>
                      {isO?(
                        <div style={{flex:1,display:"flex",gap:6,alignItems:"flex-end"}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <label style={{color:"#999",fontSize:SZ.xs}}>KG</label>
                              {pw&&<span style={{fontSize:SZ.xs,fontFamily:Mo,padding:"1px 5px",borderRadius:4,background:cw>+pw?"rgba(81,207,102,0.12)":cw<+pw?"rgba(255,71,87,0.12)":"rgba(255,255,255,0.05)",color:cw>+pw?"#51cf66":cw<+pw?"#ff4757":"#777"}}>{cw>+pw?"↑":cw<+pw?"↓":"="}{cw&&pw?Math.abs(cw-+pw):""} prev:{pw}</span>}
                            </div>
                            <input type="number" inputMode="decimal" placeholder="–" value={wd[wk]||""} onChange={e=>uwd(wk,e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:8,border:isPR?"1px solid #ffd43b":"1px solid #222",background:isPR?"rgba(255,212,59,0.04)":"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box"}}/>
                          </div>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <label style={{color:"#999",fontSize:SZ.xs}}>REPS</label>
                              {pr&&<span style={{fontSize:SZ.xs,fontFamily:Mo,padding:"1px 5px",borderRadius:4,background:"rgba(255,255,255,0.05)",color:"#777"}}>prev:{pr}</span>}
                            </div>
                            <input type="number" inputMode="numeric" placeholder={ex.reps} value={wd[rk]||""} onChange={e=>uwd(rk,e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:8,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box"}}/>
                          </div>
                          <div style={{width:52}}>
                            <label style={{color:"#999",fontSize:SZ.xs}}>RPE</label>
                            <select value={wd[rpek]||""} onChange={e=>uwd(rpek,e.target.value)} style={{width:"100%",padding:"6px 2px",borderRadius:8,border:"1px solid #222",background:"#0a0a14",color:wd[rpek]?"#ffa94d":"#555",fontSize:SZ.sm,fontFamily:Mo,outline:"none"}}>
                              <option value="">–</option>{[6,7,8,9,10].map(v=><option key={v} value={v}>{v}</option>)}
                            </select>
                          </div>
                          {isPR&&<span style={{fontSize:SZ.md}}>🏆</span>}
                        </div>
                      ):(
                        <div style={{flex:1,display:"flex",justifyContent:"space-between"}}>
                          <span style={{color:"#999",fontSize:SZ.cardSub,fontFamily:Mo}}>Set {si+1}</span>
                          <span style={{color:done?"#00d2ff":"#555",fontSize:SZ.cardSub,fontFamily:Mo}}>{wd[wk]?`${wd[wk]}kg×${wd[rk]||"?"}${wd[rpek]?` @${wd[rpek]}`:""}`:("–")}</span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              {isO&&<input type="text" placeholder={t("notes")} value={wd[`${week}-${selDay}-${ei}-note`]||""} onChange={e=>uwd(`${week}-${selDay}-${ei}-note`,e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #1a1a25",background:"#0a0a14",color:"#999",fontSize:SZ.sm,outline:"none",boxSizing:"border-box",marginTop:7}}/>}
            </div>
          );
        })}

        {day.type==="workout"&&<button onClick={() => setAddEx(addEx===selDay?null:selDay)} style={{width:"100%",padding:"13px",borderRadius:13,border:"1px dashed #333",background:addEx===selDay?"rgba(0,210,255,0.05)":"none",color:"#999",fontSize:SZ.cardSub,fontWeight:600,cursor:"pointer",marginBottom:8}}>{addEx===selDay?"Cancel":"+ Add exercise"}</button>}
        {addEx===selDay&&<AddExForm onSave={(ex) => {addExercise(selDay,ex);setAddEx(null)}}/>}

        {day.type==="workout"&&<PostWOCard pwo={dayPWO} onSave={(e) => svPostWO({...e,day:selDay})}/>}

        {day.type==="rest"&&day.activities&&day.activities.map((a,i) => {
          const rk=`${week}-${selDay}-rest-${i}`; const done=cs[rk];
          return (
            <div key={i} style={{background:done?"rgba(81,207,102,0.05)":"#111118",borderRadius:14,padding:"16px 18px",marginBottom:9,border:done?"1px solid rgba(81,207,102,0.25)":"1px solid #1a1a25",display:"flex",alignItems:"center",gap:14}}>
              <button onClick={() => {const n={...cs,[rk]:!done};setCs(n);sd("cs",n)}} style={{width:38,height:38,borderRadius:10,border:"none",flexShrink:0,background:done?"#51cf66":"#222",color:done?"#000":"#999",fontSize:SZ.md,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,minWidth:38}}>{done?"✓":"○"}</button>
              <div style={{flex:1}}>
                <p style={{color:done?"#aaa":"#eee",fontSize:SZ.md,fontWeight:600,margin:0,textDecoration:done?"line-through":"none"}}>{a.name}</p>
                <p style={{color:"#51cf66",fontSize:SZ.cardSub,margin:"4px 0 0"}}>⏱ {a.duration}</p>
                {a.note&&<p style={{color:"#999",fontSize:SZ.sm,margin:"3px 0 0"}}>{a.note}</p>}
              </div>
            </div>
          );
        })}

        {day.type==="fullrest"&&(() => {
          const rk=`${week}-${selDay}-fullrest`; const done=cs[rk];
          return (
            <div style={{background:done?"rgba(81,207,102,0.05)":"#111118",borderRadius:14,padding:"30px 18px",border:done?"1px solid rgba(81,207,102,0.25)":"1px solid #1a1a25",textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:10}}>😴</div>
              <p style={{color:"#eee",fontSize:SZ.cardTitle,fontWeight:600,margin:"0 0 16px"}}>{day.note}</p>
              <button onClick={() => {const n={...cs,[rk]:!done};setCs(n);sd("cs",n)}} style={{padding:"13px 34px",borderRadius:12,border:"none",background:done?"#51cf66":"#222",color:done?"#000":"#aaa",fontSize:SZ.btn,fontWeight:700,cursor:"pointer"}}>{done?"✓ Completed":"Mark as done"}</button>
            </div>
          );
        })()}
      </div>
    );
  };

  /* ═══ OUTDOOR ═══ */
  const renderOutdoor = () => (
    <div style={{padding:"0 16px"}}>
      <h2 style={{color:"#fff",fontSize:SZ.xl,fontWeight:700,padding:"20px 0 6px",paddingTop:"calc(20px + env(safe-area-inset-top, 0px))",margin:0}}>🏔️ {t("nav_outdoor")}</h2>
      <div style={{display:"flex",gap:6,margin:"8px 0 16px"}}>
        {[["climb","🧗 "+t("climb")],["hike","🥾 "+t("hike")],["run","🏃 "+t("run")],["yoga","🧘 "+t("yoga")],["finger","🤏 "+t("fingers")]].map(([id,l]) => (
          <button key={id} onClick={() => setOutTab(id)} style={{padding:"8px 14px",borderRadius:10,border:"none",fontSize:SZ.sm,fontWeight:600,background:outTab===id?"#51cf66":"#151520",color:outTab===id?"#000":"#999",cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      {outTab==="climb"&&<ClimbLog climb={climb} week={week} onSave={svClimb} onDel={delClimb} onUpd={updClimb}/>}
      {outTab==="hike"&&<HikeLog hikes={hikes} week={week} onSave={svHike} onDel={delHike} onUpd={updHike}/>}
      {outTab==="finger"&&<FingerLog finger={finger} week={week} onSave={svFinger} onDel={delFinger} onUpd={updFinger}/>}
      {outTab==="run"&&<RunLog runs={runs} week={week} onSave={svRun} onDel={delRun} onUpd={updRun}/>}
      {outTab==="yoga"&&<YogaLog yogas={yogas} week={week} onSave={svYoga} onDel={delYoga} onUpd={updYoga}/>}
      {outTab==="pyramid"&&<div><p style={{color:"#999",fontSize:SZ.sm,letterSpacing:2,margin:"0 0 10px"}}>🧗 {t("pyramid")}</p>
        {BG.slice().reverse().map(g => {const cnt=climb.filter(c=>c.grade===g&&(c.status==="flash"||c.status==="redpoint")).length;
          return (<div key={g} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{color:"#aaa",fontSize:SZ.sm,width:28,textAlign:"right",fontFamily:Mo}}>{g}</span>
            <div style={{flex:1,height:22,background:"#151520",borderRadius:4,overflow:"hidden"}}><div style={{width:`${Math.min(cnt*20,100)}%`,height:"100%",background:`hsl(${BG.indexOf(g)*25},70%,50%)`,borderRadius:4}}/></div>
            <span style={{color:"#999",fontSize:SZ.sm,width:20,fontFamily:Mo}}>{cnt}</span>
          </div>);
        })}
      </div>}
    </div>
  );

  /* ═══ ANALYTICS ═══ */
  const renderDash = () => {
    const rangeWeeks = dateRange === "1w" ? 1 : dateRange === "1m" ? 4 : dateRange === "3m" ? 12 : 999;
    const minW = Math.max(1, week - rangeWeeks + 1);
    const inRange = (w) => (+(w) || 0) >= minW;
    const readData = garmin.filter(g => g.readiness && inRange(g.week)).map(g => ({name:`W${g.week}`,readiness:+(g.readiness)||0,battery:+(g.battery)||0,sleep:+(g.sleep)||0}));
    const volData = Array.from({length:week},(_,i) => ({name:`W${i+1}`,vol:Math.round(weekVol(i+1)/1000)})).filter(d => +(d.name.slice(1)) >= minW);
    const liftData = prog.filter(p => (p.bench || p.squat || p.deadlift) && inRange(p.week||p.wk)).map(p => ({name:`W${p.week||p.wk}`,bench:+(p.bench)||0,squat:+(p.squat)||0,deadlift:+(p.deadlift)||0}));
    const weightData = prog.filter(p => p.bodyWeight && inRange(p.week||p.wk)).map(p => ({name:`W${p.week||p.wk}`,kg:+(p.bodyWeight)||0}));
    const bodyData = prog.filter(p => p.waist || p.chest || p.arms).map(p => ({name:`W${p.week||p.wk}`,waist:+(p.waist)||0,chest:+(p.chest)||0,arms:+(p.arms)||0}));
    const bfData = prog.filter(p => p.bodyFat).map(p => ({name:`W${p.week||p.wk}`,bf:+(p.bodyFat)||0}));
    const totalVol = Array.from({length:week},(_,i) => weekVol(i+1)).reduce((a,b) => a+b, 0);
    const totalClimbs = climb.filter(c => c.type !== "session" && (c.status==="flash"||c.status==="redpoint")).length;
    const hasData = prog.length > 0 || garmin.length > 0 || prs.length > 0 || climb.length > 0;

    return (
      <div style={{padding:"0 16px"}} className="st">
        <h2 style={{color:"#fff",fontSize:SZ.xl,fontWeight:700,padding:"20px 0 6px",margin:0}}>📊 {t("nav_analytics")}</h2>

        {/* Summary Cards */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"Volume",value:totalVol > 0 ? `${(totalVol/1000).toFixed(1)}t` : "--",icon:"🏋️",color:"#00d2ff",act:()=>setDashTab("strength")},
            {label:"PRs",value:prs.length || "--",icon:"🏆",color:"#ffd43b",act:()=>setDashTab("prs")},
            {label:t("climb"),value:totalClimbs || "--",icon:"🧗",color:"#51cf66",act:()=>{setView("outdoor");setOutTab("climb")}},
            {label:t("hike"),value:hikes.length || "--",icon:"🥾",color:"#20c997",act:()=>{setView("outdoor");setOutTab("hike")}},
            {label:t("run"),value:runs.length || "--",icon:"🏃",color:"#339af0",act:()=>{setView("outdoor");setOutTab("run")}},
            {label:t("yoga"),value:yogas.length || "--",icon:"🧘",color:"#cc5de8",act:()=>{setView("outdoor");setOutTab("yoga")}},
          ].map((s, idx) => (
            <div key={s.label} style={{background:"linear-gradient(135deg,#111118,#151520)",borderRadius:14,padding:"12px 14px",border:"1px solid #1a1a25",display:"flex",alignItems:"center",gap:10,animation:`fadeUp 0.4s ease-out ${idx*0.1}s both`,cursor:"pointer"}}
              onClick={s.act}>
              <span style={{fontSize:24}}>{s.icon}</span>
              <div>
                <p style={{color:s.color,fontSize:SZ.lg,fontWeight:700,margin:0,fontFamily:Mo}}>{s.value}</p>
                <p style={{color:"#777",fontSize:9,margin:"1px 0 0"}}>{s.label}</p>
              </div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:5,margin:"0 0 14px",overflowX:"auto",paddingBottom:3}}>
          {[["body",t("tab_body")],["strength",t("tab_strength")],["recovery",t("tab_recovery")],["prs",t("tab_prs")]].map(([id,l]) => (
            <button key={id} onClick={() => setDashTab(id)} style={{padding:"9px 16px",borderRadius:11,border:"none",fontSize:SZ.sm,fontWeight:600,background:dashTab===id?"#00d2ff":"#151520",color:dashTab===id?"#000":"#999",cursor:"pointer",flexShrink:0}}>{l}</button>
          ))}
        </div>

        {/* Date Range */}
        <div style={{display:"flex",gap:4,marginBottom:14}}>
          {[["1w","1W",1],["1m","1M",4],["3m","3M",12],["all","All",999]].map(([id,l,w]) => (
            <button key={id} onClick={() => setDateRange(id)} style={{padding:"6px 12px",borderRadius:8,border:"none",fontSize:SZ.xs,fontWeight:600,background:dateRange===id?"rgba(0,210,255,0.15)":"#0a0a14",color:dateRange===id?"#00d2ff":"#777",cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        {!hasData && (
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <p style={{fontSize:44,margin:"0 0 12px"}}>📊</p>
            <p style={{color:"#999",fontSize:SZ.md,margin:"0 0 6px"}}>{t("no_data")}</p>
            <p style={{color:"#555",fontSize:SZ.sm}}>Start tracking workouts and add weekly progress to see analytics.</p>
          </div>
        )}

        {/* BODY TAB */}
        {dashTab==="body" && hasData && (<div>
          {weightData.length > 0 ? (
            <CC t={t("weight_trend")} c="#ffd43b">
              <SLine data={weightData} lines={[{key:"kg",color:"#ffd43b"}]} h={140}/>
              {weightData.length >= 2 && (() => {
                const first = weightData[0].kg, last = weightData[weightData.length-1].kg;
                const diff = (last - first).toFixed(1);
                return (
                  <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px 0"}}>
                    <span style={{color:"#777",fontSize:SZ.xs}}>Start: {first} kg</span>
                    <span style={{color:diff > 0 ? "#51cf66" : "#ff6b6b",fontSize:SZ.sm,fontWeight:600}}>{diff > 0 ? "+" : ""}{diff} kg</span>
                    <span style={{color:"#ffd43b",fontSize:SZ.xs}}>Now: {last} kg</span>
                  </div>
                );
              })()}
            </CC>
          ) : (
            <div style={{textAlign:"center",padding:"30px 20px"}}>
              <p style={{color:"#555",fontSize:SZ.sm}}>{t("add_progress")}</p>
              <button onClick={() => setView("progress")} style={{marginTop:10,padding:"10px 20px",borderRadius:10,border:"1px solid #ffd43b",background:"none",color:"#ffd43b",fontSize:SZ.sm,fontWeight:600,cursor:"pointer"}}>+ Add progress</button>
            </div>
          )}
          {bodyData.length > 0 && (
            <CC t={t("measurements")} c="#20c997">
              <SLine data={bodyData} lines={[{key:"chest",color:"#ff6b6b"},{key:"arms",color:"#339af0"},{key:"waist",color:"#ffa94d"}]} h={140}/>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:6}}>
                {[["Chest","#ff6b6b"],["Arms","#339af0"],["Waist","#ffa94d"]].map(([l,c]) => (
                  <span key={l} style={{color:c,fontSize:SZ.xs}}>● {l}</span>
                ))}
              </div>
            </CC>
          )}
          {bfData.length > 0 && (
            <CC t={t("body_fat")} c="#cc5de8">
              <SLine data={bfData} lines={[{key:"bf",color:"#cc5de8"}]} h={120}/>
            </CC>
          )}
        </div>)}

        {/* STRENGTH TAB */}
        {dashTab==="strength" && hasData && (<div>
          {liftData.length > 0 ? (<>
            <CC t={t("lift_prog")} c="#ff6b6b">
              <SLine data={liftData} lines={[{key:"bench",color:"#ff6b6b"},{key:"squat",color:"#cc5de8"},{key:"deadlift",color:"#51cf66"}]} h={160}/>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:6}}>
                {[["Bench","#ff6b6b"],["Squat","#cc5de8"],["Deadlift","#51cf66"]].map(([l,c]) => (
                  <span key={l} style={{color:c,fontSize:SZ.xs}}>● {l}</span>
                ))}
              </div>
              {liftData.length >= 2 && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:10,padding:"0 4px"}}>
                  {[{k:"bench",l:"Bench",c:"#ff6b6b"},{k:"squat",l:"Squat",c:"#cc5de8"},{k:"deadlift",l:"Deadlift",c:"#51cf66"}].map(x => {
                    const first = liftData[0][x.k], last = liftData[liftData.length-1][x.k], diff = last - first;
                    return (
                      <div key={x.k} style={{background:"#0a0a14",borderRadius:8,padding:"8px",textAlign:"center"}}>
                        <p style={{color:"#777",fontSize:9,margin:0}}>{x.l}</p>
                        <p style={{color:x.c,fontSize:SZ.lg,fontWeight:700,margin:"2px 0 0",fontFamily:Mo}}>{last || "--"}</p>
                        {diff !== 0 && <p style={{color:diff > 0 ? "#51cf66" : "#ff4757",fontSize:SZ.xs,margin:"2px 0 0"}}>{diff > 0 ? "+" : ""}{diff}kg</p>}
                      </div>
                    );
                  })}
                </div>
              )}
            </CC>
          </>) : (
            <div style={{textAlign:"center",padding:"30px 20px"}}>
              <p style={{color:"#555",fontSize:SZ.sm}}>{t("add_progress")}</p>
            </div>
          )}
          <CC t={t("vol_tons")} c="#00d2ff">
            <SBar data={volData} dk="vol" fill="#00d2ff" h={130}/>
            {totalVol > 0 && <p style={{color:"#777",fontSize:SZ.xs,textAlign:"center",marginTop:6}}>{(totalVol/1000).toFixed(1)}t · {week} {t("week_n").toLowerCase()}</p>}
          </CC>
        </div>)}

        {/* RECOVERY TAB */}
        {dashTab==="recovery" && hasData && (<div>
          {readData.length > 0 ? (<>
            <CC t={t("readiness_trend")} c="#51cf66">
              <SLine data={readData} lines={[{key:"readiness",color:"#51cf66"},{key:"battery",color:"#00d2ff"},{key:"sleep",color:"#748ffc"}]} h={160}/>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:6}}>
                {[["Readiness","#51cf66"],["Battery","#00d2ff"],["Sleep","#748ffc"]].map(([l,c]) => (
                  <span key={l} style={{color:c,fontSize:SZ.xs}}>● {l}</span>
                ))}
              </div>
            </CC>
            {garmin.length > 0 && (() => {
              const avgR = Math.round(garmin.filter(g => g.readiness).reduce((a,g) => a + (+(g.readiness)||0), 0) / Math.max(garmin.filter(g => g.readiness).length, 1));
              const avgS = Math.round(garmin.filter(g => g.sleep).reduce((a,g) => a + (+(g.sleep)||0), 0) / Math.max(garmin.filter(g => g.sleep).length, 1));
              return (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                  {[{l:"Avg Ready",v:avgR,c:rcol(avgR)},{l:"Avg Sleep",v:avgS,c:scol(avgS)},{l:"Entries",v:garmin.length,c:"#748ffc"}].map(s => (
                    <div key={s.l} style={{background:"#111118",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid #1a1a25"}}>
                      <p style={{color:"#777",fontSize:9,letterSpacing:1,margin:0}}>{s.l}</p>
                      <p style={{color:s.c,fontSize:SZ.xl,fontWeight:700,margin:"4px 0 0",fontFamily:Mo}}>{s.v}</p>
                    </div>
                  ))}
                </div>
              );
            })()}
          </>) : (
            <div style={{textAlign:"center",padding:"30px 20px"}}>
              <p style={{fontSize:44,margin:"0 0 12px"}}>⌚</p>
              <p style={{color:"#555",fontSize:SZ.sm}}>{t("add_checkin")}</p>
              <button onClick={() => setView("garmin")} style={{marginTop:10,padding:"10px 20px",borderRadius:10,border:"1px solid #748ffc",background:"none",color:"#748ffc",fontSize:SZ.sm,fontWeight:600,cursor:"pointer"}}>+ Add check-in</button>
            </div>
          )}
        </div>)}

        {/* PRs TAB */}
        {dashTab==="prs" && (<div>
          {prs.length === 0 ? (
            <div style={{textAlign:"center",padding:"30px 20px"}}>
              <p style={{fontSize:44,margin:"0 0 12px"}}>🏆</p>
              <p style={{color:"#555",fontSize:SZ.sm}}>{t("no_data_desc")}</p>
            </div>
          ) : (<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:"linear-gradient(135deg,rgba(255,212,59,0.08),rgba(255,212,59,0.02))",borderRadius:12,padding:"14px",textAlign:"center",border:"1px solid rgba(255,212,59,0.15)"}}>
                <p style={{color:"#777",fontSize:SZ.xs,margin:0}}>{t("total_prs")}</p>
                <p style={{color:"#ffd43b",fontSize:SZ.xxl,fontWeight:700,margin:"4px 0 0",fontFamily:Mo}}>{prs.length}</p>
              </div>
              <div style={{background:"linear-gradient(135deg,rgba(255,107,107,0.08),rgba(255,107,107,0.02))",borderRadius:12,padding:"14px",textAlign:"center",border:"1px solid rgba(255,107,107,0.15)"}}>
                <p style={{color:"#777",fontSize:SZ.xs,margin:0}}>{t("best_1rm")}</p>
                <p style={{color:"#ff6b6b",fontSize:SZ.xxl,fontWeight:700,margin:"4px 0 0",fontFamily:Mo}}>{Math.max(...prs.map(p => p.e1rm))}</p>
              </div>
            </div>
            {prs.sort((a,b) => b.e1rm - a.e1rm).map((p,i) => (
              <div key={i} style={{background:"#111118",borderRadius:13,padding:"14px 16px",marginBottom:7,border:"1px solid rgba(255,212,59,0.12)",display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:SZ.icon}}>{i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : "🏆"}</span>
                <div style={{flex:1}}>
                  <p style={{color:"#eee",fontSize:SZ.md,fontWeight:600,margin:0}}>{p.exercise}</p>
                  <p style={{color:"#999",fontSize:SZ.sm,margin:"2px 0 0"}}>W{p.week||p.wk} · {p.weight}kg x {p.reps}</p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{color:"#ffd43b",fontSize:SZ.lg,fontWeight:700,margin:0,fontFamily:Mo}}>{p.e1rm}</p>
                  <p style={{color:"#777",fontSize:SZ.xs,margin:0}}>est. 1RM</p>
                </div>
              </div>
            ))}
          </>)}
        </div>)}
      </div>
    );
  };

  /* ═══ SETTINGS ═══ */
  const saveProfile = () => {
    sd("nm", name); sd("ht", height); sd("cw", curWeight); sd("gw", goalWeight); sd("age", age); sd("city", city);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
    if (city) fetchWeather(city);
  };

  const bmiCalc = () => {
    const h = Number(height), w = Number(curWeight);
    if (h < 100 || !w || w <= 0) return null;
    const hm = h / 100;
    const val = w / (hm * hm);
    if (!isFinite(val) || val <= 0 || val > 100) return null;
    return val.toFixed(1);
  };

  const bmiInfo = (bmi) => {
    const b = Number(bmi);
    if (b < 18.5) return { cat: "Underweight", col: "#339af0" };
    if (b < 25) return { cat: "Normal", col: "#51cf66" };
    if (b < 30) return { cat: "Overweight", col: "#ffd43b" };
    return { cat: "Obese", col: "#ff4757" };
  };

  const goalPct = () => {
    const cw = Number(curWeight), gw = Number(goalWeight);
    if (!cw || !gw || cw === gw) return null;
    const start = gw > cw ? cw - (gw - cw) : cw + (cw - gw);
    const pct = Math.min(100, Math.max(0, Math.round(((cw - start) / (gw - start)) * 100)));
    return pct;
  };

  const renderSettings = () => {
    const bmi = bmiCalc();
    const bi = bmi ? bmiInfo(bmi) : null;
    const gp = goalPct();

    return (
    <div style={{padding:"0 16px"}}>
      <h2 style={{color:"#fff",fontSize:SZ.xl,fontWeight:700,padding:"20px 0 12px",paddingTop:"calc(20px + env(safe-area-inset-top, 0px))",margin:0}}>{`${t('settings')}`}</h2>

      {/* ═══ PROFILE CARD ═══ */}
      {!profEdit ? (
        /* ─── VIEW MODE ─── */
        <div style={{background:"linear-gradient(135deg,#111118,#151525)",borderRadius:16,padding:"20px",border:"1px solid #1a1a25",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <p style={{color:"#00d2ff",fontSize:SZ.sm,letterSpacing:2,margin:0,fontWeight:600}}>{t("profile")}</p>
            <button onClick={() => setProfEdit(true)}
              style={{padding:"8px 18px",borderRadius:9,border:"1px solid #222",background:"none",color:"#999",fontWeight:600,fontSize:SZ.sm,cursor:"pointer"}}>
              ✏️ Edit
            </button>
          </div>

          {/* Name + Age row */}
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:14}}>
            <p style={{color:"#fff",fontSize:SZ.xxl,fontWeight:700,margin:0}}>{name || "No name"}</p>
            {age && <p style={{color:"#777",fontSize:SZ.md,margin:0}}>{age} yrs</p>}
          </div>

          {/* Stats grid */}
          <div style={{display:"grid",gridTemplateColumns:bmi?"1fr 1fr 1fr":"1fr 1fr",gap:8,marginBottom:curWeight&&goalWeight?14:0}}>
            <div style={{background:"#0a0a14",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
              <p style={{color:"#777",fontSize:10,letterSpacing:1,margin:0}}>HEIGHT</p>
              <p style={{color:"#fff",fontSize:SZ.xl,fontWeight:700,margin:"4px 0 0",fontFamily:Mo}}>{height || "--"}</p>
              <p style={{color:"#777",fontSize:SZ.xs,margin:0}}>cm</p>
            </div>
            <div style={{background:"#0a0a14",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
              <p style={{color:"#777",fontSize:10,letterSpacing:1,margin:0}}>WEIGHT</p>
              <p style={{color:"#ffd43b",fontSize:SZ.xl,fontWeight:700,margin:"4px 0 0",fontFamily:Mo}}>{curWeight || "--"}</p>
              <p style={{color:"#777",fontSize:SZ.xs,margin:0}}>kg</p>
            </div>
            {bmi && bi && (
              <div style={{background:"#0a0a14",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
                <p style={{color:"#777",fontSize:10,letterSpacing:1,margin:0}}>BMI</p>
                <p style={{color:bi.col,fontSize:SZ.xl,fontWeight:700,margin:"4px 0 0",fontFamily:Mo}}>{bmi}</p>
                <p style={{color:bi.col,fontSize:SZ.xs,margin:0}}>{bi.cat}</p>
              </div>
            )}
          </div>

          {/* Goal progress */}
          {curWeight && goalWeight && (
            <div style={{background:"#0a0a14",borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <p style={{color:"#999",fontSize:SZ.xs,letterSpacing:1,margin:0}}>GOAL</p>
                <p style={{color:Number(curWeight)>=Number(goalWeight)?"#51cf66":"#ffa94d",fontSize:SZ.sm,fontWeight:600,margin:0}}>
                  {Number(curWeight) >= Number(goalWeight) ? "✓ Reached!" : `${Math.abs(Number(goalWeight) - Number(curWeight)).toFixed(1)} kg to go`}
                </p>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{color:"#777",fontSize:SZ.sm,fontFamily:Mo}}>{curWeight}</span>
                <div style={{flex:1,height:8,background:"#1a1a25",borderRadius:4,overflow:"hidden"}}>
                  <div style={{width:`${gp !== null ? gp : 0}%`,height:"100%",background:gp>=100?"#51cf66":"linear-gradient(90deg,#ffa94d,#ffd43b)",borderRadius:4,transition:"width 0.5s"}}/>
                </div>
                <span style={{color:"#ffd43b",fontSize:SZ.sm,fontWeight:600,fontFamily:Mo}}>{goalWeight}</span>
              </div>
            </div>
          )}
        </div>
      ) : (
        /* ─── EDIT MODE ─── */
        <div style={{background:"linear-gradient(135deg,#111118,#151525)",borderRadius:16,padding:"20px",border:"1px solid rgba(0,210,255,0.15)",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{color:"#00d2ff",fontSize:SZ.sm,letterSpacing:2,margin:0,fontWeight:600}}>{t("edit_profile")}</p>
            <div style={{display:"flex",gap:8}}>
              {name && <button onClick={() => setProfEdit(false)}
                style={{padding:"10px 16px",borderRadius:10,border:"1px solid #333",background:"none",color:"#999",fontWeight:600,fontSize:SZ.sm,cursor:"pointer"}}>
                Cancel
              </button>}
              <button onClick={() => { saveProfile(); setProfEdit(false); }}
                style={{padding:"10px 22px",borderRadius:10,border:"none",background:saved?"#51cf66":"#00d2ff",color:"#000",fontWeight:700,fontSize:SZ.md,cursor:"pointer",minWidth:80}}>
                {saved ? "✓" : "Save"}
              </button>
            </div>
          </div>

          <div style={{marginBottom:12}}>
            <label style={{color:"#999",fontSize:SZ.xs,letterSpacing:1}}>{t("name")}</label>
            <input type="text" placeholder={t("name_ph")} value={name} onChange={e => setName(e.target.value)}
              style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.md,outline:"none",boxSizing:"border-box",marginTop:4}}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={{color:"#999",fontSize:SZ.xs,letterSpacing:1}}>{t("age_lbl")}</label>
              <input type="number" inputMode="numeric" placeholder="25" value={age} onChange={e => setAge(e.target.value)}
                style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box",marginTop:4}}/>
            </div>
            <div>
              <label style={{color:"#999",fontSize:SZ.xs,letterSpacing:1}}>{t("height_lbl")}</label>
              <input type="number" inputMode="numeric" placeholder="180" value={height} onChange={e => setHeight(e.target.value)}
                style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box",marginTop:4}}/>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:6}}>
            <div>
              <label style={{color:"#999",fontSize:SZ.xs,letterSpacing:1}}>{t("cur_weight")}</label>
              <input type="number" inputMode="decimal" placeholder="80" value={curWeight} onChange={e => setCurWeight(e.target.value)}
                style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box",marginTop:4}}/>
            </div>
            <div>
              <label style={{color:"#999",fontSize:SZ.xs,letterSpacing:1}}>{t("goal_weight")}</label>
              <input type="number" inputMode="decimal" placeholder="90" value={goalWeight} onChange={e => setGoalWeight(e.target.value)}
                style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box",marginTop:4}}/>
            </div>
          </div>

          {/* City for weather */}
          <div style={{marginTop:10}}>
            <label style={{color:"#999",fontSize:SZ.xs,letterSpacing:1}}>{t("city_lbl")}</label>
            <input type="text" placeholder={t("city_ph")} value={city} onChange={e => setCity(e.target.value)}
              style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.md,outline:"none",boxSizing:"border-box",marginTop:4}}/>
          </div>

          {bmi && bi && (
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"10px 14px",background:"#0a0a14",borderRadius:10}}>
              <span style={{color:bi.col,fontSize:SZ.lg,fontWeight:700,fontFamily:Mo}}>{bmi}</span>
              <span style={{color:bi.col,fontSize:SZ.sm}}>BMI · {bi.cat}</span>
              <span style={{color:"#555",fontSize:SZ.xs,marginLeft:"auto",fontStyle:"italic"}}>Less accurate for muscular builds</span>
            </div>
          )}
        </div>
      )}

      {/* ═══ WEEK SELECTOR ═══ */}
      <div style={{background:"#111118",borderRadius:14,padding:"18px",border:"1px solid #1a1a25",marginBottom:10}}>
        <p style={{color:"#999",fontSize:SZ.xs,letterSpacing:2,margin:"0 0 8px"}}>{t("cur_week")}</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {Array.from({length:12},(_,i)=>i+1).map(w => (
            <button key={w} onClick={() => chW(w)} style={{width:42,height:38,borderRadius:10,border:"none",fontSize:SZ.md,fontWeight:600,background:w===week?"#00d2ff":"#1a1a25",color:w===week?"#000":"#999",cursor:"pointer"}}>{w}</button>
          ))}
        </div>
      </div>

      {/* ═══ PROGRAM EDITOR ═══ */}
      <div style={{background:"#111118",borderRadius:14,padding:"18px",border:"1px solid #1a1a25",marginBottom:10}}>
        <p style={{color:"#999",fontSize:SZ.xs,letterSpacing:2,margin:"0 0 8px"}}>{t("prog_editor")}</p>
        <p style={{color:"#777",fontSize:SZ.sm,margin:"0 0 12px"}}>{t("prog_edit_desc")}</p>
        {program.map((day, di) => {
          if (day.type !== "workout") return null;
          const isOpen = editDay === di;
          return (
            <div key={di} style={{marginBottom:8}}>
              <button onClick={() => setEditDay(isOpen ? null : di)}
                style={{width:"100%",padding:"13px 15px",borderRadius:11,border:"1px solid #1a1a25",background:isOpen?"rgba(0,210,255,0.05)":"#0a0a14",color:"#eee",fontSize:SZ.md,fontWeight:600,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{day.icon} {day.titleKey?t(day.titleKey):day.title}</span>
                <span style={{color:"#777",fontSize:SZ.sm}}>{day.exercises?.length || 0} ex {isOpen ? "▼" : "›"}</span>
              </button>
              {isOpen && (
                <div style={{padding:"10px 0 0"}}>
                  {day.exercises && day.exercises.map((ex, ei) => (
                    <div key={ei} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",background:"#0a0a14",borderRadius:9,marginBottom:4}}>
                      <div style={{width:4,height:22,borderRadius:2,background:MC[ex.muscle] || "#999"}}/>
                      <div style={{flex:1}}>
                        <p style={{color:"#ccc",fontSize:SZ.cardSub,margin:0}}>{ex.name}</p>
                        <p style={{color:"#777",fontSize:SZ.xs,margin:"1px 0 0"}}>{ex.sets}x{ex.reps} · {ex.muscle}</p>
                      </div>
                      <button onClick={() => removeExercise(di, ei)}
                        style={{width:30,height:30,borderRadius:8,border:"none",background:"rgba(255,71,87,0.1)",color:"#ff4757",fontSize:SZ.sm,cursor:"pointer"}}>✕</button>
                    </div>
                  ))}
                  <AddExForm onSave={(ex) => addExercise(di, ex)} compact/>
                </div>
              )}
            </div>
          );
        })}
        <button onClick={() => { if (confirm(t("reset_confirm"))) { saveProgram(DEFAULT_PROGRAM); } }}
          style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid #333",background:"none",color:"#999",fontSize:SZ.sm,fontWeight:600,cursor:"pointer",marginTop:8}}>
          Reset to default program
        </button>
      </div>

      {/* ═══ WATCH TYPE ═══ */}
      <div style={{background:"#111118",borderRadius:14,padding:"18px",border:"1px solid #1a1a25",marginBottom:10}}>
        <p style={{color:"#999",fontSize:SZ.xs,letterSpacing:2,margin:"0 0 10px"}}>{t("smartwatch")}</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {Object.entries(WATCHES).map(([id, w]) => (
            <button key={id} onClick={() => {setWatchType(id); sd("wt", id)}}
              style={{padding:"9px 14px",borderRadius:10,border:"none",fontSize:SZ.sm,fontWeight:600,background:watchType===id?"#748ffc":"#1a1a25",color:watchType===id?"#000":"#999",cursor:"pointer"}}>
              {w.icon} {w.name}
            </button>
          ))}
        </div>
        <p style={{color:"#777",fontSize:SZ.xs,margin:"8px 0 0"}}>{t("watch_desc")}</p>
      </div>

      {/* ═══ LANGUAGE ═══ */}
      <div style={{background:"#111118",borderRadius:14,padding:"18px",border:"1px solid #1a1a25",marginBottom:10}}>
        <p style={{color:"#999",fontSize:SZ.xs,letterSpacing:2,margin:"0 0 10px"}}>{t("language")}</p>
        <div style={{display:"flex",gap:6}}>
          {[["en","🇬🇧 English"],["hr","🇭🇷 Hrvatski"],["de","🇩🇪 Deutsch"]].map(([id,label]) => (
            <button key={id} onClick={() => {setLang(id); sd("lang", id); LANG=id}}
              style={{flex:1,padding:"10px",borderRadius:10,border:"none",fontSize:SZ.sm,fontWeight:600,background:lang===id?"#00d2ff":"#1a1a25",color:lang===id?"#000":"#999",cursor:"pointer"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* ═══ QUICK LINKS ═══ */}
      <button onClick={() => setView("garmin")}
        style={{width:"100%",padding:"15px",borderRadius:14,border:"1px solid rgba(116,143,252,0.3)",background:"rgba(116,143,252,0.05)",color:"#748ffc",fontSize:SZ.md,fontWeight:600,cursor:"pointer",marginBottom:10}}>
        ⌚ {(WATCHES[watchType]||WATCHES.other).name} {t("checkin")}
      </button>
      <button onClick={() => setView("progress")}
        style={{width:"100%",padding:"15px",borderRadius:14,border:"1px solid rgba(255,212,59,0.3)",background:"rgba(255,212,59,0.05)",color:"#ffd43b",fontSize:SZ.md,fontWeight:600,cursor:"pointer",marginBottom:10}}>
        {t("weekly_prog")}
      </button>

      {/* ═══ DATA BACKUP ═══ */}
      <div style={{background:"#111118",borderRadius:14,padding:"18px",border:"1px solid #1a1a25",marginBottom:10}}>
        <p style={{color:"#999",fontSize:SZ.xs,letterSpacing:2,margin:"0 0 10px"}}>{t("backup")}</p>
        <button onClick={() => {
          const data = {};
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k.startsWith("gc_")) data[k] = localStorage.getItem(k);
          }
          const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `gymclimb-backup-W${week}.json`;
          a.click(); URL.revokeObjectURL(url);
        }} style={{width:"100%",padding:"14px",borderRadius:12,border:"1px solid rgba(81,207,102,0.3)",background:"rgba(81,207,102,0.05)",color:"#51cf66",fontSize:SZ.md,fontWeight:600,cursor:"pointer",marginBottom:8}}>
          {t("export_btn")}
        </button>
        <label style={{width:"100%",display:"block",padding:"14px",borderRadius:12,border:"1px solid rgba(0,210,255,0.3)",background:"rgba(0,210,255,0.05)",color:"#00d2ff",fontSize:SZ.md,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
          {t("import_btn")}
          <input type="file" accept=".json" style={{display:"none"}} onChange={(e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              try {
                const data = JSON.parse(ev.target.result);
                if (confirm(`Import ${Object.keys(data).length} data entries? This will overwrite current data.`)) {
                  Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
                  location.reload();
                }
              } catch (err) { alert("Invalid file format"); }
            };
            reader.readAsText(file);
          }} />
        </label>
        <p style={{color:"#777",fontSize:SZ.xs,margin:"8px 0 0",lineHeight:1.4}}>{t("backup_desc")}</p>
      </div>

      {/* ═══ DANGER ZONE ═══ */}
      <button onClick={() => { if (confirm(t("delete_confirm"))) { localStorage.clear(); location.reload(); } }}
        style={{width:"100%",padding:"14px",borderRadius:14,border:"1px solid rgba(255,71,87,0.3)",background:"rgba(255,71,87,0.07)",color:"#ff4757",fontSize:SZ.md,fontWeight:600,cursor:"pointer"}}>
        {t("delete_all")}
      </button>
      <p style={{color:"#555",fontSize:SZ.xs,textAlign:"center",marginTop:16}}>GymClimb v6.0 · Data stored locally on this device</p>
    </div>
  );
  };

  /* ═══ GARMIN ═══ */
  const renderGarmin = () => (
    <div style={{padding:"0 16px"}}>
      <div style={{display:"flex",alignItems:"center",padding:"16px 0",paddingTop:"calc(16px + env(safe-area-inset-top, 0px))",gap:10}}>
        <button onClick={() => setView("settings")} style={{width:40,height:40,borderRadius:12,border:"1px solid #222",background:"#111",color:"#888",fontSize:SZ.lg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <h2 style={{color:"#fff",fontSize:SZ.xl,fontWeight:700,margin:0}}>⌚ {(WATCHES[watchType]||WATCHES.other).name}</h2>
      </div>
      <p style={{color:"#999",fontSize:SZ.cardSub,margin:"0 0 14px",lineHeight:1.5}}>{t("morning")} · {(WATCHES[watchType]||WATCHES.other).name}</p>
      <MorningForm onSave={svGarmin} week={week} wt={watchType}/>
      <p style={{color:"#999",fontSize:SZ.sm,letterSpacing:2,margin:"20px 0 10px"}}>{t("history")} – W{week}</p>
      {garmin.filter(g=>g.week===week).length===0?<p style={{color:"#555",fontSize:SZ.cardSub,textAlign:"center",padding:20}}>{t("no_entries")}</p>:
        [...garmin.filter(g=>g.week===week)].reverse().map((g,i) => {
          const id = g.id || i;
          const isExp = expEntry === id;
          const r = +(g.readiness)||0, b = +(g.battery)||0, sl = +(g.sleep)||0, st = +(g.stress)||0, rhr = +(g.rhr)||0;

          // Smart insights
          const insights = [];
          if (r > 0 && r < 35) insights.push({icon:"🔴",text:t("ins_low_ready"),sev:"critical"});
          else if (r >= 35 && r < 60) insights.push({icon:"🟡",text:t("ins_mod_ready"),sev:"warn"});
          else if (r >= 60) insights.push({icon:"🟢",text:t("ins_good_ready"),sev:"ok"});

          if (sl > 0 && sl < 40) insights.push({icon:"😴",text:t("ins_poor_sleep"),sev:"critical"});
          else if (sl >= 40 && sl < 70) insights.push({icon:"😐",text:t("ins_avg_sleep"),sev:"warn"});
          else if (sl >= 70) insights.push({icon:"🌙",text:t("ins_good_sleep"),sev:"ok"});

          if (st > 70) insights.push({icon:"😰",text:t("ins_high_stress"),sev:"critical"});
          else if (st > 40) insights.push({icon:"😤",text:t("ins_mod_stress"),sev:"warn"});

          if (b > 0 && b < 25) insights.push({icon:"🪫",text:t("ins_low_bat"),sev:"critical"});
          else if (b >= 25 && b < 60) insights.push({icon:"🔋",text:t("ins_mod_bat"),sev:"warn"});
          else if (b >= 60) insights.push({icon:"⚡",text:t("ins_high_bat"),sev:"ok"});

          if (rhr > 0) {
            const avgRhr = garmin.filter(x=>+(x.rhr)>0).reduce((a,x)=>a+(+(x.rhr)||0),0) / Math.max(garmin.filter(x=>+(x.rhr)>0).length,1);
            if (rhr > avgRhr + 5) insights.push({icon:"❤️‍🔥",text:`Resting HR elevated (+${(rhr-avgRhr).toFixed(0)} above avg) – possible overtraining or illness`,sev:"critical"});
            else if (rhr < avgRhr - 3) insights.push({icon:"❤️",text:"Resting HR below average – excellent recovery",sev:"ok"});
          }

          // Pattern detection
          const weekEntries = garmin.filter(x=>x.week===week);
          const lowDays = weekEntries.filter(x=>(+(x.readiness)||100)<35).length;
          if (lowDays >= 3) insights.push({icon:"⚠️",text:`${lowDays} low readiness days this week – consider a deload week`,sev:"critical"});

          const sleepTrend = weekEntries.filter(x=>+(x.sleep)>0);
          if (sleepTrend.length >= 3) {
            const recent = sleepTrend.slice(-2).reduce((a,x)=>a+(+(x.sleep)||0),0)/2;
            const earlier = sleepTrend.slice(0,2).reduce((a,x)=>a+(+(x.sleep)||0),0)/2;
            if (recent < earlier - 10) insights.push({icon:"📉",text:"Sleep quality declining – prioritize sleep hygiene",sev:"warn"});
          }

          // Overall score
          const scores = [r,sl,b].filter(x=>x>0);
          const avg = scores.length > 0 ? Math.round(scores.reduce((a,x)=>a+x,0)/scores.length) : null;
          const sevCol = {critical:"#ff4757",warn:"#ffd43b",ok:"#51cf66"};

          // All fields for this watch type
          const cfg = WATCHES[watchType] || WATCHES.other;
          const allFields = cfg.fields.map(f => ({...f, val: g[f.k]})).filter(f => f.val);

          return (
            <div key={id} style={{marginBottom:8}}>
              <button onClick={() => setExpEntry(isExp ? null : id)} style={{width:"100%",background:isExp?"linear-gradient(135deg,#111118,#181825)":"#111118",borderRadius:isExp?"13px 13px 0 0":"13px",padding:"13px 15px",border:isExp?"1px solid rgba(116,143,252,0.2)":"1px solid #1a1a25",cursor:"pointer",textAlign:"left"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{color:"#748ffc",fontSize:SZ.sm,fontWeight:600}}>⌚ {new Date(g.date).toLocaleDateString("en",{weekday:"short",day:"numeric",month:"short"})}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {avg!==null&&<span style={{color:rcol(avg),fontSize:SZ.sm,fontFamily:Mo,fontWeight:700}}>{avg}</span>}
                    <span style={{color:rcol(r),fontSize:SZ.cardSub,fontWeight:700}}>{rlab(r)}</span>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(allFields.length,4)},1fr)`,gap:6}}>
                  {allFields.slice(0,4).map(x => (
                    <div key={x.k} style={{background:"#0a0a14",borderRadius:7,padding:"6px",textAlign:"center"}}>
                      <p style={{color:"#777",fontSize:9,letterSpacing:1,margin:0}}>{x.l.split(" ")[0]}</p>
                      <p style={{color:x.k==="readiness"?rcol(+(x.val)||0):x.k==="sleep"?scol(+(x.val)||0):x.k==="battery"?bcol(+(x.val)||0):"#aaa",fontSize:SZ.md,fontWeight:700,margin:"2px 0 0",fontFamily:Mo}}>{x.val}</p>
                    </div>
                  ))}
                </div>
              </button>

              {/* ─── EXPANDED INSIGHTS ─── */}
              {isExp && (
                <div style={{background:"linear-gradient(180deg,#141420,#111118)",borderRadius:"0 0 13px 13px",padding:"16px",border:"1px solid rgba(116,143,252,0.2)",borderTop:"none"}}>
                  {/* All metrics with bars */}
                  {allFields.length > 4 && (
                    <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(allFields.length-4,3)},1fr)`,gap:6,marginBottom:14}}>
                      {allFields.slice(4).map(x => (
                        <div key={x.k} style={{background:"#0a0a14",borderRadius:7,padding:"6px",textAlign:"center"}}>
                          <p style={{color:"#777",fontSize:9,margin:0}}>{x.l.split(" ")[0]}</p>
                          <p style={{color:"#aaa",fontSize:SZ.md,fontWeight:700,margin:"2px 0 0",fontFamily:Mo}}>{x.val}</p>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Visual metric bars */}
                  <p style={{color:"#748ffc",fontSize:SZ.xs,letterSpacing:2,margin:"0 0 10px",fontWeight:600}}>{t("metric_bd")}</p>
                  {allFields.filter(f => +(f.val) > 0 && +(f.val) <= 100).map(f => {
                    const v = +(f.val);
                    const col = f.k==="readiness"?rcol(v):f.k==="sleep"?scol(v):f.k==="stress"?(v>70?"#ff4757":v>40?"#ffd43b":"#51cf66"):bcol(v);
                    return (
                      <div key={f.k} style={{marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                          <span style={{color:"#999",fontSize:SZ.xs}}>{f.i} {f.l}</span>
                          <span style={{color:col,fontSize:SZ.sm,fontWeight:700,fontFamily:Mo}}>{v}</span>
                        </div>
                        <div style={{height:8,background:"#1a1a25",borderRadius:4,overflow:"hidden"}}>
                          <div style={{width:`${f.k==="stress"?100-v:v}%`,height:"100%",background:col,borderRadius:4,transition:"width 0.5s"}}/>
                        </div>
                      </div>
                    );
                  })}

                  {/* Smart Insights */}
                  {insights.length > 0 && (<>
                    <p style={{color:"#ffd43b",fontSize:SZ.xs,letterSpacing:2,margin:"14px 0 8px",fontWeight:600}}>{t("insights")}</p>
                    {insights.map((ins, j) => (
                      <div key={j} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:ins.sev==="critical"?"rgba(255,71,87,0.06)":ins.sev==="warn"?"rgba(255,212,59,0.04)":"rgba(81,207,102,0.04)",borderRadius:10,border:`1px solid ${ins.sev==="critical"?"rgba(255,71,87,0.15)":ins.sev==="warn"?"rgba(255,212,59,0.1)":"rgba(81,207,102,0.1)"}`,marginBottom:5}}>
                        <span style={{fontSize:SZ.md,flexShrink:0,marginTop:1}}>{ins.icon}</span>
                        <p style={{color:sevCol[ins.sev],fontSize:SZ.sm,margin:0,lineHeight:1.4}}>{ins.text}</p>
                      </div>
                    ))}
                  </>)}

                  {/* Overall Assessment */}
                  {avg !== null && (
                    <div style={{marginTop:12,padding:"12px 14px",background:avg>=60?"rgba(81,207,102,0.06)":avg>=35?"rgba(255,212,59,0.06)":"rgba(255,71,87,0.06)",borderRadius:10,border:`1px solid ${avg>=60?"rgba(81,207,102,0.15)":avg>=35?"rgba(255,212,59,0.15)":"rgba(255,71,87,0.15)"}`,textAlign:"center"}}>
                      <p style={{color:"#999",fontSize:SZ.xs,margin:"0 0 4px",letterSpacing:1}}>{t("overall")}</p>
                      <p style={{color:rcol(avg),fontSize:SZ.xxl,fontWeight:700,margin:0,fontFamily:Mo}}>{avg}</p>
                      <p style={{color:rcol(avg),fontSize:SZ.sm,fontWeight:600,margin:"4px 0 0"}}>
                        {avg >= 75 ? "Excellent – peak performance day" : avg >= 60 ? "Good – solid training day" : avg >= 45 ? "Fair – moderate session recommended" : avg >= 30 ? "Low – light activity only" : "Critical – full rest recommended"}
                      </p>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );

  /* ═══ PROGRESS ═══ */
  const renderProgress = () => (
    <div style={{padding:"0 16px"}}>
      <div style={{display:"flex",alignItems:"center",padding:"16px 0",paddingTop:"calc(16px + env(safe-area-inset-top, 0px))",gap:10}}>
        <button onClick={() => setView("settings")} style={{width:40,height:40,borderRadius:12,border:"1px solid #222",background:"#111",color:"#888",fontSize:SZ.lg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <h2 style={{color:"#fff",fontSize:SZ.xl,fontWeight:700,margin:0}}>{t("weekly_prog")}</h2>
      </div>
      <button onClick={() => setShowPF(!showPF)} style={{width:"100%",padding:"13px",borderRadius:13,border:"1px dashed #00d2ff",background:showPF?"rgba(0,210,255,0.07)":"none",color:"#00d2ff",fontSize:SZ.cardSub,fontWeight:600,cursor:"pointer",marginBottom:14}}>{showPF?"Close":`+ Add for W${week}`}</button>
      {showPF&&<ProgForm onSave={e=>{svProg(e);setShowPF(false)}} week={week}/>}
      {[...prog].reverse().map((p,i) => {
        const bmi = (Number(height) >= 100 && p.bodyWeight && Number(p.bodyWeight) > 0) ? (Number(p.bodyWeight) / Math.pow(Number(height)/100, 2)).toFixed(1) : null;
        const bmiOk = bmi && isFinite(bmi) && bmi > 0 && bmi < 100;
        const bmiCol = bmiOk ? (bmi < 18.5 ? "#339af0" : bmi < 25 ? "#51cf66" : bmi < 30 ? "#ffd43b" : "#ff4757") : "#999";
        return (
          <div key={i} style={{background:"#111118",borderRadius:13,padding:"13px 15px",marginBottom:7,border:"1px solid #1a1a25"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#00d2ff",fontSize:SZ.sm,fontWeight:600}}>{t("week_n")} {p.week || p.wk}</span>
              <div style={{display:"flex",gap:10,alignItems:"baseline"}}>
                {bmiOk && <span style={{color:bmiCol,fontSize:SZ.sm,fontFamily:Mo}}>BMI {bmi}</span>}
                <span style={{color:"#ffd43b",fontSize:SZ.md,fontWeight:700,fontFamily:Mo}}>{p.bodyWeight} kg</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {[{l:"Bench",v:p.bench,c:"#ff6b6b"},{l:"Squat",v:p.squat,c:"#cc5de8"},{l:"Deadlift",v:p.deadlift,c:"#51cf66"}].map(x=>(<div key={x.l} style={{background:"#0a0a14",borderRadius:8,padding:"8px",textAlign:"center"}}><p style={{color:"#999",fontSize:SZ.xs,letterSpacing:1,margin:0}}>{x.l}</p><p style={{color:x.c,fontSize:SZ.lg,fontWeight:700,margin:"2px 0 0",fontFamily:Mo}}>{x.v||"--"}</p></div>))}
            </div>
            {(p.waist||p.chest||p.arms||p.bodyFat) && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5,marginTop:6}}>
                {[{l:"Waist",v:p.waist,u:"cm"},{l:"Chest",v:p.chest,u:"cm"},{l:"Arms",v:p.arms,u:"cm"},{l:"BF%",v:p.bodyFat,u:"%"}].filter(x=>x.v).map(x=>(<div key={x.l} style={{background:"#0a0a14",borderRadius:6,padding:"5px",textAlign:"center"}}><p style={{color:"#777",fontSize:9,margin:0}}>{x.l}</p><p style={{color:"#20c997",fontSize:SZ.sm,fontWeight:600,margin:"1px 0 0",fontFamily:Mo}}>{x.v}{x.u}</p></div>))}
              </div>
            )}
            {p.note && <p style={{color:"#777",fontSize:SZ.xs,margin:"6px 0 0",fontStyle:"italic"}}>{p.note}</p>}
          </div>
        );
      })}
    </div>
  );

  /* ═══ RENDER ═══ */
  return (
    <div style={{minHeight:"100dvh",background:"#0a0a14",fontFamily:Fn,maxWidth:480,margin:"0 auto",position:"relative",WebkitOverflowScrolling:"touch",overscrollBehavior:"none"}}>
      <div className="safe-bottom">
        {view==="home"&&renderHome()}{view==="day"&&renderDay()}{view==="outdoor"&&renderOutdoor()}
        {view==="dashboard"&&renderDash()}{view==="settings"&&renderSettings()}{view==="garmin"&&renderGarmin()}{view==="progress"&&renderProgress()}
      </div>
      {showTimer&&<RestTimer onClose={() => setShowTimer(false)}/>}

      {/* Bottom Nav */}
      {(() => {
        const dis = dismissed[`${week}`] || [];
        let pending = 0;
        if (garmin.filter(g=>g.week===week).length===0 && !dis.includes("garmin")) pending++;
        if (!prog.find(p=>p.week===week) && !dis.includes("progress")) pending++;
        const inc = program.filter((d,i) => d.type==="workout"&&dayProg(i)!==null&&dayProg(i)<100).length;
        if (inc>0 && !dis.includes("workouts")) pending++;
        if (climb.filter(c=>c.week===week).length===0 && !dis.includes("climb")) pending++;
        if (hikes.filter(h=>h.week===week).length===0 && !dis.includes("hike")) pending++;
        return (
          <div className="nav-safe" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(10,10,20,0.97)",borderTop:"1px solid #1a1a25",paddingTop:8,display:"flex",justifyContent:"space-around",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",zIndex:100}}>
            {[{id:"home",i:"🏠",l:t("nav_program"),badge:pending},{id:"outdoor",i:"🏔️",l:t("nav_outdoor")},{id:"dashboard",i:"📊",l:t("nav_analytics")},{id:"settings",i:"⚙️",l:t("nav_settings")}].map(t=>(
              <button key={t.id} onClick={() => setView(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 16px",position:"relative",minHeight:50,minWidth:50,WebkitTapHighlightColor:"transparent"}}>
                <span style={{fontSize:SZ.navIcon}}>{t.i}</span>
                <span style={{fontSize:SZ.navLabel,letterSpacing:0.5,color:view===t.id?"#00d2ff":"#888",fontWeight:view===t.id?700:400}}>{t.l}</span>
                {t.badge>0&&<div style={{position:"absolute",top:-2,right:4,width:20,height:20,borderRadius:10,background:"#ff4757",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:11,fontWeight:700}}>{t.badge}</span></div>}
              </button>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

/* ═══════════ SUB COMPONENTS ═══════════ */

function CC({t:title,c,children}) {
  return (<div style={{background:"#111118",borderRadius:14,padding:"14px 10px 10px 0",border:"1px solid #1a1a25",marginBottom:10,animation:"fadeUp 0.5s ease-out both"}}><p style={{color:c||"#aaa",fontSize:SZ.sm,letterSpacing:2,margin:"0 0 8px 14px",fontWeight:600}}>{title}</p>{children}</div>);
}

function GarminCard({gm,isLow,onAdd}) {
  if (!gm) return (<button onClick={onAdd} style={{width:"100%",background:"linear-gradient(135deg,#0f1520,#152035)",borderRadius:16,padding:"18px 20px",marginBottom:12,border:"1px dashed rgba(116,143,252,0.3)",cursor:"pointer",textAlign:"left"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><p style={{color:"#748ffc",fontSize:SZ.sm,letterSpacing:2,margin:0,fontWeight:600}}>⌚ {t("smartwatch")}</p><p style={{color:"#999",fontSize:SZ.cardSub,margin:"4px 0 0"}}>{t("rem_watch")} →</p></div><span style={{fontSize:36}}>⌚</span></div></button>);
  const r=Number(gm.readiness)||0,b=Number(gm.battery)||0,sl=Number(gm.sleep)||0;
  return (<button onClick={onAdd} style={{width:"100%",background:isLow?"linear-gradient(135deg,#1a0a0a,#200a0a)":"linear-gradient(135deg,#0a1a10,#0a2015)",borderRadius:16,padding:"16px 18px",marginBottom:12,border:isLow?"1px solid rgba(255,71,87,0.2)":"1px solid rgba(81,207,102,0.15)",cursor:"pointer",textAlign:"left"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><p style={{color:"#748ffc",fontSize:SZ.sm,letterSpacing:2,margin:0,fontWeight:600}}>⌚ {t("smartwatch")}</p><span style={{color:rcol(r),fontSize:SZ.md,fontWeight:700}}>{rlab(r)}</span></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7}}>
      {[{l:"Readiness",v:r,c:rcol(r),mx:100},{l:"Battery",v:b,c:bcol(b),mx:100},{l:"Sleep",v:sl,c:scol(sl),mx:100},{l:"Recovery",v:gm.recovery||"–",c:"#748ffc",mx:null}].map(x=>(<div key={x.l} style={{textAlign:"center"}}><p style={{color:"#777",fontSize:9,letterSpacing:1,margin:0}}>{x.l}</p><p style={{color:x.c,fontSize:SZ.lg,fontWeight:700,margin:"3px 0 0",fontFamily:Mo}}>{x.v}</p>{x.mx&&<div style={{height:3,background:"#1a1a25",borderRadius:2,marginTop:3,overflow:"hidden"}}><div style={{width:`${(Number(x.v)||0)/x.mx*100}%`,height:"100%",background:x.c,borderRadius:2}}/></div>}</div>))}
    </div>
  </button>);
}

function MorningForm({onSave,week,wt}) {
  const cfg = WATCHES[wt] || WATCHES.other;
  const [f,setF] = useState(() => {const o = {}; cfg.fields.forEach(x => o[x.k] = ""); return o;});
  return (<div style={{background:"#111118",borderRadius:14,padding:"18px",border:"1px solid #1a1a25",marginBottom:14}}>
    <p style={{color:"#748ffc",fontSize:SZ.sm,letterSpacing:2,margin:"0 0 12px",fontWeight:600}}>{t('morning')} · {cfg.name}</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {cfg.fields.map(x => (<div key={x.k}><label style={{color:"#999",fontSize:SZ.xs}}>{x.i} {x.l}</label><input type="number" inputMode="numeric" placeholder={x.p} value={f[x.k]||""} onChange={e => setF({...f,[x.k]:e.target.value})} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.input,fontFamily:Mo,outline:"none",boxSizing:"border-box",marginTop:4}}/></div>))}
    </div>
    <button onClick={() => {const hasVal = Object.values(f).some(v => v); if(hasVal){onSave(f);const o = {}; cfg.fields.forEach(x => o[x.k] = ""); setF(o)}}} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"#748ffc",color:"#000",fontSize:SZ.btn,fontWeight:700,cursor:"pointer",marginTop:14}}>Save ⌚</button>
  </div>);
}

function PostWOCard({pwo,onSave}) {
  const [show,setShow] = useState(false);
  const [f,setF] = useState({avgHR:"",maxHR:"",calories:"",teAerobic:"",teAnaerobic:"",load:""});
  if (pwo&&!show) return (<div style={{background:"#111118",borderRadius:14,padding:"14px 16px",marginTop:8,border:"1px solid #1a1a25"}}><p style={{color:"#748ffc",fontSize:SZ.sm,letterSpacing:2,margin:"0 0 8px",fontWeight:600}}>⌚ POST-WORKOUT</p><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>{[{l:"❤️ HR",v:pwo.avgHR?`${pwo.avgHR}/${pwo.maxHR||"–"}`:null,c:"#ff6b6b"},{l:"🔥 kcal",v:pwo.calories,c:"#ffa94d"},{l:"⚡ Load",v:pwo.load,c:"#ffd43b"}].filter(x=>x.v).map(x=>(<div key={x.l} style={{background:"#0a0a14",borderRadius:7,padding:"6px",textAlign:"center"}}><p style={{color:"#777",fontSize:9,margin:0}}>{x.l}</p><p style={{color:x.c,fontSize:SZ.md,fontWeight:700,margin:"2px 0 0",fontFamily:Mo}}>{x.v}</p></div>))}</div></div>);
  return (<div style={{marginTop:8}}><button onClick={() => setShow(!show)} style={{width:"100%",padding:"12px",borderRadius:13,border:"1px dashed rgba(116,143,252,0.4)",background:show?"rgba(116,143,252,0.05)":"none",color:"#748ffc",fontSize:SZ.cardSub,fontWeight:600,cursor:"pointer"}}>{show?"Cancel":"⌚ Add watch post-workout"}</button>
    {show&&<div style={{background:"#111118",borderRadius:14,padding:"16px",border:"1px solid #1a1a25",marginTop:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div><label style={{color:"#999",fontSize:SZ.xs}}>{t("yoga_dur")}</label><input type="number" inputMode="numeric" value={f.duration} onChange={e=>setF({...f,duration:e.target.value})} style={{width:"100%",padding:"9px",borderRadius:9,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.md,fontFamily:Mo,outline:"none",boxSizing:"border-box"}}/></div>
        <div><label style={{color:"#999",fontSize:SZ.xs}}>{t("yoga_focus")}</label><select value={f.focus} onChange={e=>setF({...f,focus:e.target.value})} style={{width:"100%",padding:"9px",borderRadius:9,border:"1px solid #222",background:"#0a0a14",color:f.focus?"#fff":"#555",fontSize:SZ.sm,outline:"none"}}><option value="">{t("select")}</option>{FOCUS.map(fc=>(<option key={fc} value={fc}>{fc}</option>))}</select></div>
      </div>
      <input type="text" placeholder={t("notes")} value={f.note} onChange={e=>setF({...f,note:e.target.value})} style={{width:"100%",padding:"9px",borderRadius:9,border:"1px solid #222",background:"#0a0a14",color:"#999",fontSize:SZ.sm,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
      <button onClick={() => {if(+f.duration>0){onSave(f);setShow(false);setF({type:"Vinyasa",duration:"",focus:"",note:""})}}} style={{width:"100%",padding:"12px",borderRadius:11,border:"none",background:"#cc5de8",color:"#fff",fontSize:SZ.md,fontWeight:700,cursor:"pointer"}}>{t("save_yoga")}</button>
    </div>}
    {wk.length===0?<p style={{color:"#555",fontSize:SZ.cardSub,textAlign:"center",padding:20}}>{t("no_yoga")} W{week}</p>:wk.map((y,i)=>{
      const yid=String(y.id||y.date||i);const isExp=exp===yid;const isEdit=editing===yid;
      return (
        <div key={yid} style={{background:"#111118",borderRadius:13,marginBottom:7,border:isExp?"1px solid rgba(204,93,232,0.2)":"1px solid #1a1a25",overflow:"hidden"}}>
          <div onClick={() => {if(!isEdit){setExp(isExp?null:yid);setEditing(null)}}} style={{padding:"14px 16px",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:SZ.icon}}>🧘</span>
              <div style={{flex:1}}>
                <p style={{color:"#eee",fontSize:SZ.md,fontWeight:600,margin:0}}>{y.type} <span style={{color:"#cc5de8",fontWeight:400,fontSize:SZ.sm}}>{y.duration}min</span></p>
                <p style={{color:"#999",fontSize:SZ.sm,margin:"2px 0 0"}}>{y.focus||""}</p>
              </div>
              <span style={{color:"#555",fontSize:SZ.xs}}>{y.date?new Date(y.date).toLocaleDateString("en",{day:"numeric",month:"short"}):""} {isExp?"▼":"›"}</span>
            </div>
          </div>
          {isExp&&!isEdit&&<div style={{padding:"0 16px 14px",borderTop:"1px solid #1a1a25"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,margin:"12px 0 8px"}}>
              {[{l:"🧘",v:y.type},{l:"⏱",v:`${y.duration}min`},{l:"🎯",v:y.focus||"–"}].map(x=>(<div key={x.l} style={{background:"#0a0a14",borderRadius:8,padding:"7px",textAlign:"center"}}><p style={{color:"#777",fontSize:10,margin:0}}>{x.l}</p><p style={{color:"#ccc",fontSize:SZ.sm,fontWeight:600,margin:"2px 0 0"}}>{x.v}</p></div>))}
            </div>
            {y.date&&<p style={{color:"#777",fontSize:SZ.xs,margin:"0 0 4px"}}>📅 {new Date(y.date).toLocaleDateString("en",{weekday:"long",day:"numeric",month:"long"})}</p>}
            {y.note&&<p style={{color:"#777",fontSize:SZ.sm,margin:"0 0 10px",fontStyle:"italic"}}>{y.note}</p>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={() => startEdit(y)} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"#00d2ff",color:"#000",fontSize:SZ.md,fontWeight:700,cursor:"pointer"}}>✏️ {t("edit")}</button>
              <button onClick={() => onDel(yid)} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"#ff4757",color:"#fff",fontSize:SZ.md,fontWeight:700,cursor:"pointer"}}>🗑️</button>
            </div>
          </div>}
          {isEdit&&<div style={{padding:"0 16px 14px",borderTop:"1px solid rgba(0,210,255,0.3)"}}>
            <div style={{marginTop:12,marginBottom:8}}><label style={{color:"#999",fontSize:SZ.xs}}>{t("yoga_type")}</label><div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>{TYPES.map(ty=>(<button key={ty} onClick={() => setEf({...ef,type:ty})} style={{padding:"7px 12px",borderRadius:8,border:"none",background:ef.type===ty?"#cc5de8":"#1a1a25",color:ef.type===ty?"#fff":"#999",fontSize:SZ.xs,fontWeight:600,cursor:"pointer"}}>{ty}</button>))}</div></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={{color:"#999",fontSize:SZ.xs}}>{t("yoga_dur")}</label><input type="number" inputMode="numeric" value={ef.duration||""} onChange={e=>setEf({...ef,duration:e.target.value})} style={{width:"100%",padding:"9px",borderRadius:9,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.md,fontFamily:Mo,outline:"none",boxSizing:"border-box"}}/></div>
              <div><label style={{color:"#999",fontSize:SZ.xs}}>{t("yoga_focus")}</label><select value={ef.focus||""} onChange={e=>setEf({...ef,focus:e.target.value})} style={{width:"100%",padding:"9px",borderRadius:9,border:"1px solid #222",background:"#0a0a14",color:"#fff",fontSize:SZ.sm,outline:"none"}}><option value="">{t("select")}</option>{FOCUS.map(fc=>(<option key={fc} value={fc}>{fc}</option>))}</select></div>
            </div>
            <input type="text" value={ef.note||""} onChange={e=>setEf({...ef,note:e.target.value})} placeholder={t("notes")} style={{width:"100%",padding:"9px",borderRadius:9,border:"1px solid #222",background:"#0a0a14",color:"#999",fontSize:SZ.sm,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEdit} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"#cc5de8",color:"#fff",fontSize:SZ.md,fontWeight:700,cursor:"pointer"}}>✓ {t("save")}</button>
              <button onClick={() => setEditing(null)} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid #333",background:"none",color:"#999",fontSize:SZ.md,fontWeight:600,cursor:"pointer"}}>{t("cancel")}</button>
            </div>
          </div>}
        </div>
    )})}
  </div>);
}

/* ═══ MOUNT ═══ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
